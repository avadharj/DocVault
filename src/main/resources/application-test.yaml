spring:
  datasource:
    url: jdbc:h2:mem:docvault-test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=false
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true

app:
  jwt:
    secret: dGhpcyBpcyBhIHZlcnkgc2VjcmV0IGtleSBmb3IgSldU
    expiration-ms: 86400000
  cors:
    allowed-origins: http://localhost:3000
  aws:
    region: us-east-1
    s3:
      bucket-name: test-bucket
      access-key: test-key
      secret-key: test-secret
    